<head>

  justify-content:center;
  height:100vh;
}

.card{
  background:white;
  width:360px;
  padding:40px;
  text-align:center;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
  font-size:22px;
  margin-bottom:15px;
}

p{
  color:#555;
  font-size:15px;
}

.btn{
  display:inline-block;
  margin-top:25px;
  background:#ffb400;
  color:white;
  padding:16px 32px;
  border-radius:10px;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
  transition:0.2s;
}

.btn:hover{
  background:#ff9800;
  transform:scale(1.03);
}
</style>
</head>
