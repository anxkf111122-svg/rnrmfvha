<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사은품 안내</title>

<!-- 1초 후 자동 이동 -->
<meta http-equiv="refresh" content="1; url=https://blog.naver.com/lucky78_">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  background:white;
  padding:40px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.spinner{
  margin:20px auto;
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #ffb400;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

p{
  font-size:16px;
  color:#444;
}
</style>
</head>

<body>

<div class="box">

<p>
🎁 사은품 안내 페이지로 이동합니다.<br>
잠시만 기다려주세요.
</p>

<div class="spinner"></div>

</div>

</body>
</html>
